server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA/statik routing — mavjud bo'lmagan yo'l uchun index.html qaytariladi
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Statik assetlar uchun kesh
    location /_next/static {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}